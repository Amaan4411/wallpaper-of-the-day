<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Wallpaper of the Day</title>

    <link rel="stylesheet" href="css/main.css">
    

</head>

<body>

<div class="app">

    <!-- ================= HEADER ================= -->

    <header class="header">

        <div class="brand">

            <img
                src="assets/logo.png"
                class="logo"
                alt="Wallpaper Logo"
            >

            <div class="brand-text">

                <h1>Wallpaper of the Day</h1>

                <p>Desktop Wallpaper Scheduler</p>

            </div>

        </div>

        <button
            id="settings"
            class="settings-btn"
        >
            ⚙
        </button>

    </header>


    <!-- ================= HERO ================= -->

    <main>

        <section class="hero">

            <div class="hero-image">

                Loading...

            </div>

            <div class="hero-overlay">

                <div class="hero-left">

                    <span class="hero-tag">

                        NOW SHOWING

                    </span>

                    <h2 id="hero-day">

                        Friday

                    </h2>

                    <p id="hero-file">

                        No wallpaper selected

                    </p>

                    <p id="hero-resolution">

                        Resolution: --

                    </p>

                    <div class="countdown">

                        Next Change

                        <span id="countdown">

                            18h 22m

                        </span>

                    </div>

                </div>

                <div class="hero-actions">

                    <button id="replaceBtn">

                        Replace

                    </button>

                    <button id="folderBtn">

                        Open Folder

                    </button>

                </div>

            </div>

        </section>


        <!-- ================= WEEKLY ================= -->

        <section class="schedule">

            <div class="section-header">

                <h2>

                    Weekly Schedule

                </h2>

                <p>

                    Double-click any card to replace its wallpaper

                </p>

            </div>

            <div class="cards">

            </div>

        </section>


       

    </main>

</div>


<script src="js/actions.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/renderer.js"></script>

</body>

</html>
